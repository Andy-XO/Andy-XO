<svg viewBox="0 0 1200 320" width="1200" height="320" xmlns="http://www.w3.org/2000/svg" fill="none" role="img" aria-label="Atharva Patil, AI and Robotics Engineer">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05070D"/>
      <stop offset="55%" stop-color="#0A0F1C"/>
      <stop offset="100%" stop-color="#060B16"/>
    </linearGradient>
    <!-- Accent gradient -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D9FF"/>
      <stop offset="50%" stop-color="#33A1FF"/>
      <stop offset="100%" stop-color="#6E7BFF"/>
    </linearGradient>
    <linearGradient id="accentSoft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#00D9FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6E7BFF" stop-opacity="0.0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0"/>
    </radialGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#12243B" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)" opacity="0.5"/>

  <!-- Ambient glows -->
  <circle cx="180" cy="80" r="220" fill="url(#glow)">
    <animate attributeName="cy" values="80;120;80" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1040" cy="260" r="240" fill="url(#glow)">
    <animate attributeName="cy" values="260;220;260" dur="11s" repeatCount="indefinite"/>
  </circle>

  <!-- Orbital ring system (autonomous / aerospace motif) -->
  <g transform="translate(1010 160)" opacity="0.55">
    <ellipse rx="120" ry="46" fill="none" stroke="url(#accent)" stroke-width="1.2" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="24s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse rx="120" ry="46" fill="none" stroke="url(#accent)" stroke-width="1.2" opacity="0.35" transform="rotate(60)">
      <animateTransform attributeName="transform" type="rotate" from="60" to="420" dur="30s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse rx="120" ry="46" fill="none" stroke="url(#accent)" stroke-width="1.2" opacity="0.25" transform="rotate(120)">
      <animateTransform attributeName="transform" type="rotate" from="120" to="480" dur="36s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Orbiting node -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="24s" repeatCount="indefinite"/>
      <circle cx="120" cy="0" r="4" fill="#00D9FF">
        <animate attributeName="r" values="3;5;3" dur="2.4s" repeatCount="indefinite"/>
      </circle>
    </g>
    <circle r="9" fill="#00D9FF" opacity="0.9"/>
    <circle r="20" fill="none" stroke="#00D9FF" stroke-width="1" opacity="0.4">
      <animate attributeName="r" values="14;30;14" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Telemetry pulse line -->
  <polyline points="40,250 120,250 150,210 180,290 215,230 250,250 1000,250"
            fill="none" stroke="url(#accentSoft)" stroke-width="2" opacity="0.6">
    <animate attributeName="opacity" values="0.25;0.7;0.25" dur="3.5s" repeatCount="indefinite"/>
  </polyline>

  <!-- Text block -->
  <g transform="translate(64 118)">
    <text x="0" y="0" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15" letter-spacing="6" fill="#5FC9F8" font-weight="600">BUILDING INTELLIGENT AUTONOMOUS SYSTEMS</text>
    <text x="0" y="58" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="62" font-weight="800" fill="#F4FAFF">Atharva Patil</text>
    <text x="2" y="58" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="62" font-weight="800" fill="url(#accent)" opacity="0.0">
      Atharva Patil
      <animate attributeName="opacity" values="0;0.9;0" dur="6s" repeatCount="indefinite"/>
    </text>
    <text x="0" y="98" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="500" fill="#9FB4C7">AI · Robotics · Autonomous Systems · Aerospace · Embedded Intelligence</text>
    <rect x="0" y="118" width="0" height="3" rx="1.5" fill="url(#accent)">
      <animate attributeName="width" values="0;520;520" dur="2.4s" fill="freeze" repeatCount="1"/>
    </rect>
  </g>

  <!-- Corner brackets (mission-control framing) -->
  <g stroke="#00D9FF" stroke-width="2" opacity="0.7" fill="none">
    <path d="M24 24 H64 M24 24 V64"/>
    <path d="M1176 24 H1136 M1176 24 V64"/>
    <path d="M24 296 H64 M24 296 V256"/>
    <path d="M1176 296 H1136 M1176 296 V256"/>
  </g>
</svg>
