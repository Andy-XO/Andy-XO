# ───────────────────────────────────────────────────────────────────────
#  Contribution Snake Animation
#  Generates an animated SVG of the snake eating your contribution graph
#  and pushes it to the `output` branch, which README.md references.
#  No secrets needed — uses the built-in GITHUB_TOKEN.
# ───────────────────────────────────────────────────────────────────────
name: Generate Snake Animation

on:
  schedule:
    # Refresh every 12 hours
    - cron: "0 */12 * * *"
  workflow_dispatch:        # allow manual runs from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#00D9FF&color_dots=#0a0f1c,#0e3a52,#1e6f99,#33a1ff,#00d9ff
            dist/github-snake.svg?palette=github-light&color_snake=#0088ff

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
