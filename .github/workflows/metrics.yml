# ───────────────────────────────────────────────────────────────────────
#  GitHub Metrics (lowlighter/metrics)
#  Renders a rich SVG dashboard (languages, activity, habits, isocalendar)
#  into assets/metrics.svg on the `main` branch.
#
#  SETUP (one-time):
#    1. Create a Personal Access Token (classic) with scope: repo, read:user
#       → https://github.com/settings/tokens
#    2. Add it as a repo secret named METRICS_TOKEN
#       (Settings → Secrets and variables → Actions → New repository secret)
#    3. Optionally add  ![Metrics](./assets/metrics.svg)  to your README.
#  If you skip this, the rest of the profile still works — only this file
#  is optional.
# ───────────────────────────────────────────────────────────────────────
name: GitHub Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Render metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Andy-XO
          filename: assets/metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          # Cyan / mission-control palette
          config_order: base.header, languages, habits, isocalendar
